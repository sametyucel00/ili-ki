name: iliski_kocu_ai
description: Local-first relationship communication assistant built with Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  uuid: ^4.5.1
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
