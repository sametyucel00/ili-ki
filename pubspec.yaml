name: iliski_kocu_ai
description: Guest-first relationship communication AI assistant built with Flutter and Firebase.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.4.2
  cloud_functions: ^5.1.2
  firebase_analytics: ^11.3.0
  firebase_crashlytics: ^4.1.2
  firebase_remote_config: ^5.1.2
  firebase_messaging: ^15.1.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  uuid: ^4.5.1
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.2.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
