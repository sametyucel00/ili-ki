name: iOS Release Build

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the built IPA to TestFlight"
        required: false
        default: "false"
  push:
    tags:
      - "ios-v*"

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode --output $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Debug signing certificate
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "Certificate file exists:"
          ls -lh $RUNNER_TEMP/build_certificate.p12
          echo "Available signing identities:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH || true

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode --output $PP_PATH
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Debug provisioning profile
        env:
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          DECODED_PLIST=$RUNNER_TEMP/profile.plist
          echo "Provisioning profile file exists:"
          ls -lh $PP_PATH
          security cms -D -i $PP_PATH > $DECODED_PLIST
          echo "Provisioning profile summary:"
          /usr/libexec/PlistBuddy -c "Print :Name" $DECODED_PLIST || true
          /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" $DECODED_PLIST || true
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" $DECODED_PLIST || true
          /usr/libexec/PlistBuddy -c "Print :UUID" $DECODED_PLIST || true
          /usr/libexec/PlistBuddy -c "Print :ExpirationDate" $DECODED_PLIST || true
          echo "Expected profile name: $IOS_PROFILE_NAME"
          echo "Expected team id: $APPLE_TEAM_ID"
          echo "Expected bundle id: $IOS_BUNDLE_ID"

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
        run: |
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
            <key>destination</key>
            <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Inject signing settings into Xcode project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = path.read_text()

          bundle_id = os.environ["IOS_BUNDLE_ID"]
          team_id = os.environ["APPLE_TEAM_ID"]
          profile_name = os.environ["IOS_PROFILE_NAME"]

          target = f'PRODUCT_BUNDLE_IDENTIFIER = {bundle_id};'
          replacement = (
              f'DEVELOPMENT_TEAM = {team_id};\n'
              f'\t\t\t\tPRODUCT_BUNDLE_IDENTIFIER = {bundle_id};\n'
              f'\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_name}";\n'
              f'\t\t\t\tCODE_SIGN_STYLE = Manual;'
          )

          if target not in text:
              raise SystemExit("Could not find Runner bundle identifier in project.pbxproj")

          text = text.replace(target, replacement)
          path.write_text(text)
          PY

      - name: Debug Xcode signing settings
        env:
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Runner build settings:"
          xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -showBuildSettings | grep -E "PRODUCT_BUNDLE_IDENTIFIER|DEVELOPMENT_TEAM|CODE_SIGN_ENTITLEMENTS|PROVISIONING_PROFILE_SPECIFIER|CODE_SIGN_STYLE" || true
          echo "Expected bundle id: $IOS_BUNDLE_ID"
          echo "Expected team id: $APPLE_TEAM_ID"

      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --dart-define=AI_BACKEND_URL="${{ secrets.AI_BACKEND_URL }}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testflight == 'true'
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build/ios/ipa -name '*.ipa' | head -n 1)" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
