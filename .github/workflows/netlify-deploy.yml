name: Netlify Legal Hub Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "netlify/functions/**"
      - "netlify.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy site and functions to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=site --functions=netlify/functions --message="Deploy Hisle site and AI function"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
